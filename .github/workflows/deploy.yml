name: Deploy Admin

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: git -C C:\Cockpit\repos\admin-cockpit pull origin main

      - name: Install dependencies
        run: npm install
        working-directory: C:\Cockpit\repos\admin-cockpit

      - name: Build
        run: npx vite build
        working-directory: C:\Cockpit\repos\admin-cockpit